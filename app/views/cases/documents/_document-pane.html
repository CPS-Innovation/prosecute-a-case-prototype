<div class="app-document-pane">
  <div class="app-document">
    <div
      class="app-document__content"
      id="document-content"
      data-case-id="{{ caseId }}"
      data-document-id="{{ documentId }}"
    >
      {% for section in sections %}
        <h2 class="app-document__section-heading">{{ section.heading }}</h2>
        {% for paragraph in section.paragraphs %}
          <p class="app-document__paragraph">{{ paragraph | safe }}</p>
        {% endfor %}
      {% endfor %}
    </div>
  </div>
</div>
